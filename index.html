<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obra Nova SPA - Presupuestos</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a365d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Obra Nova" />

    <!-- SEO / share -->
    <meta name="description" content="Sistema de presupuestos Obra Nova SPA" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Deregistra tutti i Service Worker vecchi e pulisce la cache
      // così i nuovi deploy arrivano subito senza blocchi
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(reg => reg.unregister());
        });
        caches.keys().then(keys => {
          keys.forEach(key => caches.delete(key));
        });
      }
    </script>
  </body>
</html>
